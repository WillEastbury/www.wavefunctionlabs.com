server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html|css|js)$ {
        add_header Cache-Control "public, max-age=3600";
    }

    gzip on;
    gzip_types text/html text/css application/javascript;
    gzip_min_length 256;
}
